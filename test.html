<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Deploy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#f8fff8,#eef8ef);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    position:relative;
    width:800px;
    max-width:90%;
    background:white;
    border-radius:24px;
    padding:70px 50px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    overflow:hidden;
}

/* Lá góc trái */
.container::before{
    content:"🌿🍃🌱";
    position:absolute;
    top:15px;
    left:20px;
    font-size:70px;
    transform:rotate(-20deg);
    opacity:.18;
}

/* Lá góc phải */
.container::after{
    content:"🍃🌿🌱";
    position:absolute;
    bottom:15px;
    right:20px;
    font-size:70px;
    transform:rotate(18deg);
    opacity:.18;
}

h1{
    color:#2e7d32;
    font-size:40px;
    margin-bottom:20px;
}

.message{
    font-size:24px;
    color:#444;
    line-height:1.7;
}

.highlight{
    color:#43a047;
    font-weight:bold;
}

.leaf{
    font-size:34px;
    margin-bottom:25px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="leaf">🌿 🍃 🌱 🍀</div>

    <h1>✨ Deploy Thành Công ✨</h1>

    <div class="message">
        Đây là demo trang web sau khi deploy cho
        <span class="highlight">Hậu</span>.
        <br><br>
        Chúc hệ thống hoạt động ổn định và nhiều bug tự biến mất 🍃
    </div>

</div>

</body>
</html>
